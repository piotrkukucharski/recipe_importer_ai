name: Build & Package Container

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-go:
    name: Build & Test Go Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install Dependencies
        run: go mod download

      - name: Run Unit Tests
        run: go test -v -run "TestURL|TestInstagram" ./...

      - name: Compile App
        run: CGO_ENABLED=0 GOOS=linux go build -v -o recipe_importer_ai main.go

  build-docker:
    name: Build, Save & Publish Docker Image
    needs: build-go
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build and load locally so we can save it as an artifact file
      - name: Build & Load Docker Image Locally
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: recipe-importer-ai:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Save the image as a tarball to "zapisywać" (save) the container to the workflow run
      - name: Save Docker Image as Tarball Artifact
        run: |
          mkdir -p /tmp/artifacts
          docker save -o /tmp/artifacts/recipe_importer_ai.tar recipe-importer-ai:latest

      # Upload the tarball as a downloadable Github Actions artifact
      - name: Upload Container Artifact
        uses: actions/upload-artifact@v4
        with:
          name: recipe-importer-ai-container
          path: /tmp/artifacts/recipe_importer_ai.tar
          retention-days: 7

      # For direct changes on 'main' branch or tag pushes (without pull request):
      # Log in to GitHub Container Registry (GHCR) and publish the image
      - name: Log in to GitHub Container Registry (GHCR)
        if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata for GHCR
        if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && github.event_name != 'pull_request'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            latest

      - name: Build and Push Docker Image to GHCR
        if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    name: Create GitHub Release with Binaries
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-go
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install Dependencies
        run: go mod download

      - name: Compile Binaries for Release
        run: |
          mkdir -p dist
          # Linux
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -v -ldflags="-s -w" -o dist/recipe_importer_ai-linux-amd64 main.go
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -v -ldflags="-s -w" -o dist/recipe_importer_ai-linux-arm64 main.go
          # macOS (Darwin)
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -v -ldflags="-s -w" -o dist/recipe_importer_ai-darwin-amd64 main.go
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -v -ldflags="-s -w" -o dist/recipe_importer_ai-darwin-arm64 main.go
          # Windows
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -v -ldflags="-s -w" -o dist/recipe_importer_ai-windows-amd64.exe main.go
          GOOS=windows GOARCH=arm64 CGO_ENABLED=0 go build -v -ldflags="-s -w" -o dist/recipe_importer_ai-windows-arm64.exe main.go

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/recipe_importer_ai-linux-amd64
            dist/recipe_importer_ai-linux-arm64
            dist/recipe_importer_ai-darwin-amd64
            dist/recipe_importer_ai-darwin-arm64
            dist/recipe_importer_ai-windows-amd64.exe
            dist/recipe_importer_ai-windows-arm64.exe
          draft: false
          prerelease: false
          generate_release_notes: true
